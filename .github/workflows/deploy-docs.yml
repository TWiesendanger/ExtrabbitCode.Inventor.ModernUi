name: Deploy Documentation

on:
  push:
    branches: [master]
    paths:
      - 'documentation/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: documentation

      - name: Build
        run: npm run build
        working-directory: documentation
        env:
          VITE_BASE_PATH: /ExtrabbitCode.Inventor.ModernUi/

      - name: Flatten basename subdirectory
        run: |
          cp -r documentation/build/client/ExtrabbitCode.Inventor.ModernUi/. documentation/build/client/
          rm -rf documentation/build/client/ExtrabbitCode.Inventor.ModernUi

      - name: Add .nojekyll
        run: touch documentation/build/client/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
